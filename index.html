<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reactive Plyometrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="app">
    <!-- Screens rendered here by router.js -->
    <div id="screen-home" class="screen active"></div>
    <div id="screen-calendar" class="screen"></div>
    <div id="screen-warmup" class="screen"></div>
    <div id="screen-session" class="screen"></div>
    <div id="screen-trophies" class="screen"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-screen="home" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-screen="calendar" aria-label="Calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Program</span>
    </button>
    <button class="nav-btn" data-screen="trophies" aria-label="Trophies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 22V12M14 22V12"/>
        <path d="M8 17h8"/>
        <rect x="6" y="2" width="12" height="13" rx="2"/>
      </svg>
      <span>Trophies</span>
    </button>
  </nav>

  <!-- Badge Celebration Overlay -->
  <div id="badge-celebration" class="celebration-overlay hidden">
    <div class="celebration-content">
      <div class="celebration-particles" id="particles"></div>
      <div class="celebration-title">CYCLE COMPLETE!</div>
      <div class="celebration-badge" id="celebration-badge-svg"></div>
      <div class="celebration-subtitle" id="celebration-subtitle"></div>
      <button class="btn-primary celebration-dismiss" id="celebration-dismiss">Claim Badge</button>
    </div>
  </div>

  <!-- Scripts: load in dependency order -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/badges.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/session.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
